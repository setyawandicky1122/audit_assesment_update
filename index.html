<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Audit Competency Strategy Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#F2F1ED;--surface:#FFF;--surface2:#ECEAE3;--border:#DEDAD0;--border2:#C4C0B2;
  --navy:#1B3A6B;--navyl:#EAF0FA;--gold:#B8860B;--goldl:#FBF3DC;
  --teal:#0D6B5E;--teall:#E0F5F2;--slate:#4A5568;--red:#8B2020;--redl:#FAE8E8;
  --amber:#7A4F0D;--amberl:#FDF0DB;--green:#2D6A2D;--greenl:#E6F2E6;
  --purple:#4A3B9C;--purpll:#EEEBFB;
  --text:#1A202C;--text2:#4A5568;--text3:#9AA0AC;
  --r:12px;--rsm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.page{max-width:760px;margin:0 auto;padding:2rem 1rem 5rem;}
h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;color:var(--navy);}
h2{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--navy);margin-bottom:1rem;}
h3{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:.75rem;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;}
.card+.card{margin-top:1rem;}

/* INPUTS */
input,select,textarea{width:100%;padding:.65rem 1rem;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--surface);color:var(--text);outline:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--navy);}
textarea{resize:vertical;min-height:80px;line-height:1.6;}
label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.form-row{margin-bottom:1rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

/* BUTTONS */
.btn{padding:.6rem 1.25rem;border-radius:var(--rsm);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:background .15s,opacity .15s;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-primary:hover{opacity:.88;background:var(--navy);}
.btn-danger{background:var(--redl);color:var(--red);border-color:var(--red);}
.btn-danger:hover{opacity:.85;background:var(--redl);}
.btn-sm{padding:.4rem .85rem;font-size:12px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem;}

/* BADGE */
.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;}
.badge-admin{background:#EEEBFB;color:#4A3B9C;}
.badge-user{background:#E0F5F2;color:#0D6B5E;}
.badge-ketua{background:#EAF0FA;color:#1B3A6B;}
.badge-anggota{background:#FBF3DC;color:#7A4F0D;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:.6rem .9rem;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);}
.tbl td{padding:.7rem .9rem;border-bottom:.5px solid var(--border);color:var(--text2);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface2);}

/* NAV */
.topbar{background:var(--navy);padding:.75rem 1.5rem;display:flex;justify-content:space-between;align-items:center;}
.topbar-brand{color:#fff;font-size:14px;font-weight:600;letter-spacing:.02em;}
.topbar-brand span{opacity:.6;font-weight:400;margin-left:8px;font-size:12px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-user{color:#fff;font-size:12px;opacity:.8;}
.topbar-btn{color:#fff;font-size:12px;opacity:.7;cursor:pointer;padding:.3rem .75rem;border:1px solid rgba(255,255,255,.3);border-radius:var(--rsm);background:transparent;font-family:'DM Sans',sans-serif;}
.topbar-btn:hover{opacity:1;}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{padding:.6rem 1rem;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);}
.tab:hover{color:var(--text2);}

/* SECTION */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}

/* ALERT */
.alert{padding:.75rem 1rem;border-radius:var(--rsm);font-size:13px;margin-bottom:1rem;}
.alert-danger{background:var(--redl);color:var(--red);border:1px solid #f0b5b5;}
.alert-success{background:var(--greenl);color:var(--green);border:1px solid #b0d9b0;}
.alert-info{background:var(--navyl);color:var(--navy);border:1px solid #bad1ee;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-card{width:100%;max-width:400px;}
.login-header{text-align:center;margin-bottom:2rem;}
.login-header h1{margin-bottom:6px;}
.login-header p{font-size:13px;color:var(--text2);}

/* GAME ELEMENTS (reused from assessment) */
.hud-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem;}
.hud-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.hud-stat{text-align:center;}
.hud-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;}
.hud-val{font-size:17px;font-weight:700;}
.bar-w{height:4px;background:var(--border);border-radius:2px;margin-top:4px;}
.bar-f{height:100%;border-radius:2px;transition:width .5s;}
.sc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.sc-title-text{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;color:var(--text);}
.sc-dilema{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px;}
.sc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.sc-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--text3);}
.sc-iia{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--navyl);color:var(--navy);font-weight:500;}
.comp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
.comp-tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem;}
.cbtn{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rsm);padding:.75rem 1rem;cursor:pointer;text-align:left;font-size:13px;color:var(--text);line-height:1.55;font-family:'DM Sans',sans-serif;transition:background .15s;}
.cbtn:hover{background:var(--surface2);}
.cbtn.picked{background:var(--navyl);border:1.5px solid var(--navy);}
.cbtn.faded{opacity:.35;pointer-events:none;}
.opt-label{display:block;font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px;letter-spacing:.05em;}
.outcome-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem;}
.outcome-box.active{border-color:var(--navy);}
.ob-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.ob-lbl.active{color:var(--navy);}
.ob-txt{font-size:13px;color:var(--text);line-height:1.65;}
.eff-pills{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.epill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;}
.ob-level{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.game-footer{display:flex;justify-content:space-between;align-items:center;}
.round-lbl{font-size:13px;color:var(--text3);}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.role-card{border:1.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;cursor:pointer;transition:border-color .2s,background .2s;background:var(--surface);}
.role-card:hover{border-color:var(--border2);background:var(--surface2);}
.role-card.selected{border-color:var(--navy);background:var(--navyl);}
.role-name{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:4px;}
.role-desc{font-size:12px;color:var(--text2);line-height:1.5;}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.meta-item{background:var(--surface2);border-radius:var(--rsm);padding:.75rem;text-align:center;}
.meta-num{font-size:22px;font-weight:600;color:var(--navy);}
.meta-lbl{font-size:11px;color:var(--text3);margin-top:2px;}
.result-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;text-align:center;margin-bottom:1rem;}
.score-ring{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:110px;height:110px;border-radius:50%;border:3px solid var(--border);margin-bottom:1rem;}
.score-big{font-size:38px;font-weight:700;line-height:1;}
.score-denom{font-size:12px;color:var(--text3);}
.r-grade{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:.5rem;}
.r-note{font-size:13px;color:var(--text2);line-height:1.7;max-width:480px;margin:0 auto 1.25rem;}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem;}
.metric-item{background:var(--surface2);border-radius:var(--rsm);padding:.65rem .9rem;}
.metric-lbl{font-size:10px;color:var(--text3);margin-bottom:4px;}
.metric-val{font-size:16px;font-weight:700;}
.cp-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.cp-name{font-size:12px;color:var(--text2);min-width:150px;}
.cp-bar-w{flex:1;height:5px;background:var(--border);border-radius:3px;}
.cp-bar-f{height:100%;border-radius:3px;}
.cp-score{font-size:12px;font-weight:600;min-width:28px;text-align:right;}
.section-sep{display:flex;align-items:center;gap:12px;margin:1.5rem 0 1rem;}
.section-sep span{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.section-sep hr{flex:1;border:none;border-top:1px solid var(--border);}
.timestamp{font-size:11px;color:var(--text3);margin-top:.75rem;}

/* QUESTION EDITOR */
.choice-editor{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:1rem;margin-bottom:.75rem;}
.choice-editor label{color:var(--text3);}
.choice-level{display:flex;align-items:center;gap:8px;margin-top:.5rem;}
.choice-level label{margin:0;white-space:nowrap;}
.choice-level input[type=number]{width:70px;}

/* MODAL OVERLAY (in-flow) */
.modal-overlay{background:rgba(0,0,0,.45);border-radius:var(--r);padding:2rem;display:flex;align-items:flex-start;justify-content:center;min-height:300px;}
.modal-box{background:var(--surface);border-radius:var(--r);padding:1.5rem;width:100%;max-width:560px;}
.modal-title{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:1rem;}

/* RESPONSIVE */
@media(max-width:540px){
  .form-grid{grid-template-columns:1fr;}
  .choices{grid-template-columns:1fr;}
  .hud-grid{grid-template-columns:repeat(2,1fr);}
  .metric-grid{grid-template-columns:repeat(2,1fr);}
  .role-grid{grid-template-columns:1fr;}
}
@media print{
  .topbar,.tabs,.btn-row,.no-print{display:none!important;}
  body{background:#fff;}
}
</style>
</head>

let APP = {
  session: null,        // { userId, role, name, jabatan }
  view: 'login',        // login | dashboard | game | admin-users | admin-scenarios | admin-results | edit-scenario | edit-user

  alert: null,
};

function setView(v, extra={}){ APP.view=v; Object.assign(APP, extra); render(); }
function setAlert(msg, type='info'){ APP.alert={msg,type}; render(); }
function clearAlert(){ APP.alert=null; }

// AUTH
// ═══════════════════════════════════════════════════════════════════════
function login(username, password){
  const users = DB.get('users')||[];
  const u = users.find(x=>x.username===username && x.password===hashPass(password) && x.active);
  if(!u) return false;
  APP.session = {userId:u.id, role:u.role, name:u.name, jabatan:u.jabatan};
  DB.set('session', APP.session);
  return true;
}
function logout(){ APP.session=null; DB.del('session'); setView('login'); }
function restoreSession(){ const s=DB.get('session'); if(s){ APP.session=s; return true; } return false; }

// GAME LOGIC
// ═══════════════════════════════════════════════════════════════════════
function cl(v){ return Math.max(0,Math.min(100,v)); }
function scColor(v){ return v>=70?'#2D6A2D':v>=45?'#7A4F0D':'#8B2020'; }

function initGame(jabatan){
  const scenarios = (DB.get('scenarios')||[]).filter(s=>s.active);
  const COMPS_ALL = ['AOR','ADA','CSO','DDR','DLI','CLE','DOT','HPA','SOR','TLE','ATH','BOR','CEC','CCE','COA','DEC','EST','ISE','INN','MIM','PSO'];
  const compScores = {};
  COMPS_ALL.forEach(c=>{ compScores[c]=60; });
  APP.gameState = {
    jabatan, scenarios,
    round:0, akurasi:60, dampak:60, kompetensi:60,
    chosen:null, answers:[], compScores, phase:'play'
  };
}

function gameChoose(i){
  const G = APP.gameState;
  if(G.chosen!==null) return;
  G.chosen=i;
  const sc = G.scenarios[G.round];
  const isKetua = G.jabatan==='ketua';
  const choices = isKetua ? sc.choicesKetua : sc.choicesAnggota;
  const comps = isKetua ? sc.compKetua : sc.compAnggota;
  const c = choices[i];
  const delta = c.level>=4?15:c.level===3?5:c.level===2?-8:-15;
  G.akurasi  = cl(G.akurasi  + delta + (Math.random()*6-3));
  G.dampak   = cl(G.dampak   + delta + (Math.random()*6-3));
  G.kompetensi=cl(G.kompetensi+delta+ (Math.random()*6-3));
  const lDelta=(c.level-3)*8;
  comps.forEach(code=>{ G.compScores[code]=cl((G.compScores[code]||60)+lDelta); });
  G.answers.push({round:G.round, choice:i, level:c.level, title:sc.title});
  render();
}

function gameNext(){
  const G = APP.gameState;
  if(G.round < G.scenarios.length-1){ G.round++; G.chosen=null; }
  else {
    G.phase='result';
    const avg=Math.round((G.akurasi+G.dampak+G.kompetensi)/3);
    const result = {
      id:'r'+Date.now(), userId:APP.session.userId, name:APP.session.name,
      jabatan:G.jabatan, akurasi:Math.round(G.akurasi), dampak:Math.round(G.dampak),
      kompetensi:Math.round(G.kompetensi), avg, compScores:{...G.compScores},
      answers:G.answers, completedAt:new Date().toISOString()
    };
    const results = DB.get('results')||[];
    results.push(result);
    DB.set('results',results);
  }
  render();
}

// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════════════
function render(){
  document.getElementById('root').innerHTML = buildPage();
  bindEvents();
}

function buildPage(){
  if(APP.view==='login') return renderLogin();
  return `
    ${renderTopbar()}
    <div class="page">
      ${APP.alert?renderAlert():''}
      ${APP.view==='dashboard'?renderDashboard():''}
      ${APP.view==='game'?renderGame():''}
      ${APP.view==='admin-users'?renderAdminUsers():''}
      ${APP.view==='admin-scenarios'?renderAdminScenarios():''}
      ${APP.view==='admin-results'?renderAdminResults():''}
      ${APP.view==='edit-scenario'?renderEditScenario():''}
      ${APP.view==='edit-user'?renderEditUser():''}
    </div>`;
}

function renderAlert(){
  const {msg,type} = APP.alert;
  return `<div class="alert alert-${type}" id="alertBox">${msg} <span style="float:right;cursor:pointer;opacity:.6" onclick="clearAlert();render()">✕</span></div>`;
}

// ─── GAME ──────────────────────────────────────────────────────────────
function renderGame(){
  const G = APP.gameState;
  if(!G) return '<div class="card"><p>Game tidak aktif.</p></div>';
  if(G.phase==='result') return renderGameResult();

  const sc = G.scenarios[G.round];
  const isKetua = G.jabatan==='ketua';
  const choices = isKetua ? sc.choicesKetua : sc.choicesAnggota;
  const comps = isKetua ? sc.compKetua : sc.compAnggota;
  const question = isKetua ? sc.qKetua : sc.qAnggota;
  const avg = Math.round((G.akurasi+G.dampak+G.kompetensi)/3);

  const COMP_GROUPS = {
    core:['AOR','ADA','CSO','DDR','DLI'],
    leadership:['CLE','DOT','HPA','SOR','TLE'],
    specific:['ATH','BOR','CEC','CCE','COA','DEC','EST','ISE','INN','MIM','PSO'],
  };
  const compColor = c => COMP_GROUPS.core.includes(c)?'background:#EAF0FA;color:#1B3A6B':COMP_GROUPS.leadership.includes(c)?'background:#E0F5F2;color:#0D6B5E':'background:#EEEBFB;color:#4A3B9C';

  const outBox = G.chosen===null
    ? `<div class="outcome-box"><div class="ob-lbl">Konteks situasi</div><div style="font-size:13px;color:var(--text2);font-style:italic;line-height:1.6;">Baca skenario di atas lalu pilih tindakan yang paling mencerminkan pendekatan Anda sebagai ${isKetua?'Ketua Tim':'Anggota Tim'} Audit.</div></div>`
    : (() => {
        const c = choices[G.chosen];
        const lvlBg = c.level>=4?'var(--greenl)':c.level===3?'var(--amberl)':'var(--redl)';
        const lvlCol = c.level>=4?'var(--green)':c.level===3?'var(--amber)':'var(--red)';
        return `<div class="outcome-box active">
          <div class="ob-lbl active">Hasil keputusan Anda</div>
          <div class="ob-txt">${c.out}</div>
          <div class="eff-pills"><span class="ob-level" style="background:${lvlBg};color:${lvlCol}">Level Kompetensi: ${c.level}/5</span></div>
        </div>`;
      })();

  const btns = choices.map((c,i)=>{
    let cls='cbtn';
    if(G.chosen!==null) cls+=i===G.chosen?' picked':' faded';
    return `<button class="${cls}" data-choice="${i}"><span class="opt-label">Pilihan ${c.opt}</span>${c.text}</button>`;
  }).join('');

  const nxt = G.chosen!==null ? `<button class="btn btn-primary" onclick="gameNext()">${G.round<G.scenarios.length-1?'Skenario Berikutnya →':'Lihat Hasil Asesmen →'}</button>` : '';

  return `
    <div class="hud-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
        <div style="font-size:13px;font-weight:600;color:var(--navy)">${APP.session.name}</div>
        <span class="badge ${isKetua?'badge-ketua':'badge-anggota'}">${isKetua?'Ketua Tim Audit':'Anggota Tim Audit'}</span>
      </div>
      <div class="hud-grid">
        ${[{l:'Akurasi & Bukti',v:Math.round(G.akurasi),c:'#4A3B9C'},{l:'Dampak Temuan',v:Math.round(G.dampak),c:'#0D6B5E'},{l:'Kompetensi',v:Math.round(G.kompetensi),c:'#1B3A6B'},{l:'Rata-rata',v:avg,c:'#1D9E75'}].map(x=>`
        <div class="hud-stat">
          <div class="hud-lbl">${x.l}</div>
          <div class="hud-val" style="color:${scColor(x.v)}">${x.v}</div>
          <div class="bar-w"><div class="bar-f" style="width:${x.v}%;background:${x.c}"></div></div>
        </div>`).join('')}
      </div>
    </div>
    <div class="sc-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;">
        <div class="sc-title-text">${sc.title}</div>
        <span class="badge ${sc.risk==='high'?'badge-admin':'badge-user'}" style="${sc.risk==='high'?'background:var(--redl);color:var(--red)':'background:var(--amberl);color:var(--amber)'}">${sc.risk==='high'?'Kritis':'Sedang'}</span>
      </div>
      <div class="sc-tags">
        <span class="sc-tag">Skenario ${G.round+1}/${G.scenarios.length}</span>
        <span class="sc-tag">${sc.theme}</span>
        <span class="sc-iia">${sc.iia}</span>
      </div>
      <div class="comp-tags">${comps.map(c=>`<span class="comp-tag" style="${compColor(c)}">${c}</span>`).join('')}</div>
      <div class="sc-dilema">${sc.dilema}</div>
      <div style="height:1px;background:var(--border);margin:12px 0;"></div>
      <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;">Pertanyaan untuk ${isKetua?'Ketua Tim':'Anggota Tim'}</div>
      <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:0;">${question}</div>
    </div>
    ${outBox}
    <div class="choices">${btns}</div>
    <div class="game-footer">
      <span class="round-lbl">Skenario ${G.round+1} dari ${G.scenarios.length}</span>
      ${nxt}
    </div>`;
}

function renderGameResult(){
  const G = APP.gameState;
  const avg = Math.round((G.akurasi+G.dampak+G.kompetensi)/3);
  const isKetua = G.jabatan==='ketua';
  let grade, note, ringCol;
  if(avg>=80){grade='Auditor Unggulan';note='Keputusan Anda secara konsisten mencerminkan pemikiran strategis, bukti yang kuat, dan dampak yang terukur. Anda siap menghadapi engagement dengan kompleksitas tinggi.';ringCol='var(--green)';}
  else if(avg>=65){grade='Auditor Kompeten';note='Instink audit Anda solid di sebagian besar skenario. Ada area yang masih bisa diperkuat dengan pengalaman dan refleksi terstruktur.';ringCol='var(--navy)';}
  else if(avg>=50){grade='Auditor Berkembang';note='Anda menunjukkan potensi yang baik. Fokus pada pendalaman teknik analitis dan keberanian mempertahankan temuan berbasis bukti.';ringCol='var(--amber)';}
  else{grade='Perlu Pembimbingan Intensif';note='Beberapa pola keputusan menunjukkan tantangan dalam independensi dan kedalaman analisis. Ini titik awal untuk program pengembangan yang terstruktur.';ringCol='var(--red)';}

  const now = new Date();
  const tgl = now.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  const jam = now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  const COMP_GROUPS = [
    {label:'Core Competency',codes:['AOR','ADA','CSO','DDR','DLI'],color:'#1B3A6B'},
    {label:'Leadership Competency',codes:['CLE','DOT','HPA','SOR','TLE'],color:'#0D6B5E'},
    {label:'Specific Competency',codes:['ATH','BOR','CEC','CCE','COA','DEC','EST','ISE','INN','MIM','PSO'],color:'#4A3B9C'},
  ];
  const COMP_NAMES = {AOR:'Achievement Orientation',ADA:'Adaptability',CSO:'Customer Service Orientation',DDR:'Data Driven',DLI:'Digital Literacy',CLE:'Change Leadership',DOT:'Developing Others',HPA:'Holding People Accountable',SOR:'Strategic Orientation',TLE:'Team Leadership',ATH:'Analytical Thinking',BOR:'Business Orientation',CEC:'Collaborate with Ecosystem',CCE:'Concern for Cost Efficiency',COA:'Concern for Order & Accuracy',DEC:'Decisiveness',EST:'Engaging Stakeholders',ISE:'Information Seeking',INN:'Innovation',MIM:'Making Impact',PSO:'Problem Solving'};

  const compProfile = COMP_GROUPS.map(g=>`
    <div style="margin-bottom:1rem;">
      <div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem;">${g.label}</div>
      ${g.codes.map(c=>{
        const v=Math.round(G.compScores[c]||60);
        return `<div class="cp-row">
          <div class="cp-name">${c} — ${COMP_NAMES[c]}</div>
          <div class="cp-bar-w"><div class="cp-bar-f" style="width:${v}%;background:${g.color}"></div></div>
          <div class="cp-score" style="color:${scColor(v)}">${v}</div>
        </div>`;
      }).join('')}
    </div>`).join('');

  return `
    <div class="result-hero" id="resultCard">
      <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;">Hasil Asesmen Kompetensi Audit</div>
      <div style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);margin-bottom:4px;">${APP.session.name}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:1.5rem;">${isKetua?'Ketua Tim Audit':'Anggota Tim Audit'} · Internal Audit Division · Asuransi Umum</div>
      <div class="score-ring" style="border-color:${ringCol}">
        <div class="score-big" style="color:${ringCol}">${avg}</div>
        <div class="score-denom">/ 100</div>
      </div>
      <div class="r-grade" style="color:${ringCol}">${grade}</div>
      <div class="r-note">${note}</div>
      <div class="metric-grid">
        <div class="metric-item"><div class="metric-lbl">Akurasi & Bukti</div><div class="metric-val" style="color:${scColor(Math.round(G.akurasi))}">${Math.round(G.akurasi)}</div></div>
        <div class="metric-item"><div class="metric-lbl">Dampak Temuan</div><div class="metric-val" style="color:${scColor(Math.round(G.dampak))}">${Math.round(G.dampak)}</div></div>
        <div class="metric-item"><div class="metric-lbl">Kompetensi</div><div class="metric-val" style="color:${scColor(Math.round(G.kompetensi))}">${Math.round(G.kompetensi)}</div></div>
      </div>
      <div class="timestamp">Diselesaikan: ${tgl}, ${jam} WIB · ACSA v2.0 · Global Internal Audit Standards (IIA 2024)</div>
    </div>
    <div class="section-sep"><span>Profil 21 Kompetensi</span><hr/></div>
    <div class="card">${compProfile}</div>
    <div class="btn-row no-print">
      <button class="btn" onclick="window.print()">Cetak / Simpan PDF</button>
      <button class="btn" onclick="copyResultText(${avg})">Salin Ringkasan</button>
      <button class="btn btn-primary" onclick="setView('dashboard')">Kembali ke Beranda</button>
    </div>`;
}

      <div class="form-row"><label>Kode Kompetensi Ketua Tim (pisahkan koma)</label><input id="esCompK" value="${(s.compKetua||[]).join(',')}"/></div>
      <div class="form-row"><label>Kode Kompetensi Anggota Tim (pisahkan koma)</label><input id="esCompA" value="${(s.compAnggota||[]).join(',')}"/></div>
      <div class="form-row"><label>Dilema / Narasi Skenario</label><textarea id="esDilema" rows="5">${s.dilema||''}</textarea></div>
      <div class="form-row"><label>Pertanyaan untuk Ketua Tim</label><textarea id="esQK" rows="2">${s.qKetua||''}</textarea></div>
      <div class="form-row"><label>Pertanyaan untuk Anggota Tim</label><textarea id="esQA" rows="2">${s.qAnggota||''}</textarea></div>
    </div>

    <div class="card" style="margin-bottom:1rem;">
      <h3>Pilihan Jawaban — Ketua Tim Audit</h3>
      ${buildChoiceEditor(s.choicesKetua||[{opt:'A',text:'',out:'',level:3},{opt:'B',text:'',out:'',level:5},{opt:'C',text:'',out:'',level:2},{opt:'D',text:'',out:'',level:1}],'ck','Ketua Tim')}
    </div>

    <div class="card" style="margin-bottom:1rem;">
      <h3>Pilihan Jawaban — Anggota Tim Audit</h3>
      ${buildChoiceEditor(s.choicesAnggota||[{opt:'A',text:'',out:'',level:3},{opt:'B',text:'',out:'',level:5},{opt:'C',text:'',out:'',level:2},{opt:'D',text:'',out:'',level:1}],'ca','Anggota Tim')}
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveScenario('${s.id||''}')">Simpan Soal</button>
      <button class="btn" onclick="setView('admin-scenarios')">Batal</button>
    </div>`;
}

// ─── ADMIN: RESULTS ────────────────────────────────────────────────────
function renderAdminResults(){
  const results = [...(DB.get('results')||[])].reverse();
  const rows = results.length ? results.map(r=>`
    <tr>
      <td>${r.name}</td>
      <td><span class="badge ${r.jabatan==='ketua'?'badge-ketua':'badge-anggota'}">${r.jabatan==='ketua'?'Ketua Tim':'Anggota Tim'}</span></td>
      <td style="font-weight:600;color:${scColor(r.avg)}">${r.avg}/100</td>
      <td>${r.akurasi}</td><td>${r.dampak}</td><td>${r.kompetensi}</td>
      <td style="font-size:12px;">${new Date(r.completedAt).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteResult('${r.id}')">Hapus</button></td>
    </tr>`).join('')
  : '<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:2rem;">Belum ada data hasil asesmen.</td></tr>';

  const total = results.length;
  const avgAll = total ? Math.round(results.reduce((s,r)=>s+r.avg,0)/total) : 0;

  return `
    <div class="section-header">
      <h2>Hasil Asesmen Tim</h2>
      <button class="btn" onclick="exportResults()">Export CSV</button>
    </div>
    <div class="meta-grid" style="margin-bottom:1rem;">
      <div class="meta-item"><div class="meta-num">${total}</div><div class="meta-lbl">Total asesmen</div></div>
      <div class="meta-item"><div class="meta-num" style="color:${scColor(avgAll)}">${avgAll}</div><div class="meta-lbl">Rata-rata skor</div></div>
      <div class="meta-item"><div class="meta-num">${(DB.get('users')||[]).filter(u=>u.active&&u.role==='user').length}</div><div class="meta-lbl">Peserta aktif</div></div>
    </div>
    <div class="card" style="overflow-x:auto;">
      <table class="tbl">
        <thead><tr><th>Nama</th><th>Jabatan</th><th>Skor</th><th>Akurasi</th><th>Dampak</th><th>Kompetensi</th><th>Tanggal</th><th>Aksi</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// EVENT BINDING & ACTIONS
// ═══════════════════════════════════════════════════════════════════════
function bindEvents(){
  // Login
  const loginBtn = document.getElementById('loginBtn');
  if(loginBtn){
    loginBtn.onclick = () => {
      const u = document.getElementById('loginUser')?.value.trim();
      const p = document.getElementById('loginPass')?.value;
      if(!login(u,p)){
        document.getElementById('loginErr').style.display='block';
        document.getElementById('loginErr').textContent='Username atau password salah, atau akun tidak aktif.';
      } else {
        setView('dashboard');
      }
    };
    document.getElementById('loginPass')?.addEventListener('keydown', e=>{ if(e.key==='Enter') loginBtn.click(); });
  }
  // Choice buttons in game
  document.querySelectorAll('[data-choice]').forEach(btn=>{
    btn.onclick = () => gameChoose(parseInt(btn.dataset.choice));
  });
}

// Game
function startGame(jabatan){
  const scenarios = (DB.get('scenarios')||[]).filter(s=>s.active);
  if(scenarios.length===0){ setAlert('Tidak ada soal aktif. Hubungi administrator.','danger'); return; }
  initGame(jabatan||APP.session.jabatan||'ketua');
  setView('game');
}

// User management
function editUser(id){ setView('edit-user',{editTarget:id}); }
function toggleUser(id){
  const users=DB.get('users')||[];
  const u=users.find(x=>x.id===id);
  if(u){ u.active=!u.active; DB.set('users',users); if(APP.session.userId===id){logout();return;} setAlert(`User ${u.name} ${u.active?'diaktifkan':'dinonaktifkan'}.`,'success'); setView('admin-users'); }
}
function deleteUser(id){
  if(!confirm('Hapus pengguna ini? Data tidak dapat dikembalikan.')) return;
  DB.set('users',(DB.get('users')||[]).filter(x=>x.id!==id));
  setAlert('Pengguna berhasil dihapus.','success'); setView('admin-users');
}
function saveUser(id){
  const name=document.getElementById('euName')?.value.trim();
  const username=document.getElementById('euUser')?.value.trim();
  const pass=document.getElementById('euPass')?.value;
  const pass2=document.getElementById('euPass2')?.value;
  const role=document.getElementById('euRole')?.value;
  const jabatan=document.getElementById('euJabatan')?.value;
  if(!name||!username){ setAlert('Nama dan username wajib diisi.','danger'); return; }
  if(!id && !pass){ setAlert('Password wajib diisi untuk user baru.','danger'); return; }
  if(pass && pass!==pass2){ setAlert('Konfirmasi password tidak cocok.','danger'); return; }
  const users=DB.get('users')||[];
  if(!id){
    if(users.find(u=>u.username===username)){ setAlert('Username sudah digunakan.','danger'); return; }
    users.push({id:'u'+Date.now(),name,username,password:hashPass(pass),role,jabatan,active:true,createdAt:new Date().toISOString()});
  } else {
    const u=users.find(x=>x.id===id);
    if(u){ u.name=name; u.username=username; u.role=role; u.jabatan=jabatan; if(pass) u.password=hashPass(pass); }
  }
  DB.set('users',users);
  setAlert(`User ${name} berhasil ${!id?'ditambahkan':'diperbarui'}.`,'success');
  setView('admin-users');
}

// Scenario management
function editScenario(id){ APP.editTarget=(DB.get('scenarios')||[]).find(s=>s.id===id)||{}; setView('edit-scenario'); }
function newScenario(){ APP.editTarget={choicesKetua:[{opt:'A',text:'',out:'',level:3},{opt:'B',text:'',out:'',level:5},{opt:'C',text:'',out:'',level:2},{opt:'D',text:'',out:'',level:1}],choicesAnggota:[{opt:'A',text:'',out:'',level:3},{opt:'B',text:'',out:'',level:5},{opt:'C',text:'',out:'',level:2},{opt:'D',text:'',out:'',level:1}]}; setView('edit-scenario'); }
function toggleScenario(id){
  const sc=DB.get('scenarios')||[];
  const s=sc.find(x=>x.id===id);
  if(s){ s.active=!s.active; DB.set('scenarios',sc); setAlert(`Soal ${s.active?'diaktifkan':'dinonaktifkan'}.`,'success'); setView('admin-scenarios'); }
}
function deleteScenario(id){
  if(!confirm('Hapus soal ini? Data tidak dapat dikembalikan.')) return;
  DB.set('scenarios',(DB.get('scenarios')||[]).filter(x=>x.id!==id));
  setAlert('Soal berhasil dihapus.','success'); setView('admin-scenarios');
}
function saveScenario(id){
  const g = v => document.getElementById(v)?.value.trim()||'';
  const gn = v => parseInt(document.getElementById(v)?.value)||3;
  const title=g('esTitle'), theme=g('esTheme'), risk=g('esRisk'), iia=g('esIia');
  const dilema=g('esDilema'), qKetua=g('esQK'), qAnggota=g('esQA');
  if(!title||!dilema){ setAlert('Judul dan narasi skenario wajib diisi.','danger'); return; }
  const compKetua=g('esCompK').split(',').map(x=>x.trim()).filter(Boolean);
  const compAnggota=g('esCompA').split(',').map(x=>x.trim()).filter(Boolean);
  const opts=['A','B','C','D'];
  const choicesKetua=opts.map((o,i)=>({opt:o,text:g(`ck_text_${i}`),out:g(`ck_out_${i}`),level:gn(`ck_level_${i}`)}));
  const choicesAnggota=opts.map((o,i)=>({opt:o,text:g(`ca_text_${i}`),out:g(`ca_out_${i}`),level:gn(`ca_level_${i}`)}));
  const scenarios=DB.get('scenarios')||[];
  if(!id){
    scenarios.push({id:'s'+Date.now(),active:true,title,theme,risk,iia,compKetua,compAnggota,dilema,qKetua,qAnggota,choicesKetua,choicesAnggota});
  } else {
    const s=scenarios.find(x=>x.id===id);
    if(s) Object.assign(s,{title,theme,risk,iia,compKetua,compAnggota,dilema,qKetua,qAnggota,choicesKetua,choicesAnggota});
  }
  DB.set('scenarios',scenarios);
  setAlert(`Soal berhasil ${!id?'ditambahkan':'diperbarui'}.`,'success');
  setView('admin-scenarios');
}

// Results
function deleteResult(id){
  if(!confirm('Hapus data hasil ini?')) return;
  DB.set('results',(DB.get('results')||[]).filter(r=>r.id!==id));
  setAlert('Hasil asesmen dihapus.','success'); setView('admin-results');
}
function exportResults(){
  const results=DB.get('results')||[];
  if(!results.length){ setAlert('Tidak ada data untuk diekspor.','danger'); return; }
  const header='Nama,Jabatan,Skor,Akurasi,Dampak,Kompetensi,Tanggal\n';
  const rows=results.map(r=>`"${r.name}","${r.jabatan}",${r.avg},${r.akurasi},${r.dampak},${r.kompetensi},"${new Date(r.completedAt).toLocaleDateString('id-ID')}"`).join('\n');
  const blob=new Blob([header+rows],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='hasil_asesmen_acsa.csv'; a.click();
}
function copyResultText(avg){
  const G=APP.gameState;
  if(!G) return;
  const txt=`HASIL ASESMEN KOMPETENSI AUDIT (ACSA v2.0)\nInternal Audit Division — Asuransi Umum Indonesia\n\nNama: ${APP.session.name}\nJabatan: ${G.jabatan==='ketua'?'Ketua Tim Audit':'Anggota Tim Audit'}\nTanggal: ${new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}\n\nSKOR AKHIR: ${avg}/100\nAkurasi & Bukti: ${Math.round(G.akurasi)}\nDampak Temuan : ${Math.round(G.dampak)}\nKompetensi    : ${Math.round(G.kompetensi)}\n\nGlobal Internal Audit Standards (GIAS) IIA 2024`;
  navigator.clipboard.writeText(txt).then(()=>alert('Ringkasan berhasil disalin!')).catch(()=>alert('Silakan screenshot halaman ini.'));
}
function clearAlert(){ APP.alert=null; }

// ═══════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════
seedDefaults();
if(!restoreSession()) APP.view='login';
else APP.view='dashboard';
render();
</script>
